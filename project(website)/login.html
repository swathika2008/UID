<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login / Sign Up — Aurelia Jewels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
/* RESET */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* VARIABLES */
:root{
  --gold:#d4af37;
  --gold-light:#f7e7a9;
  --gold-dim:#a8872a;

  --black:#0a0a0a;
  --dark:#111;
  --card:#161616;

  --border:rgba(212,175,55,0.25);
  --text:#f0e8d0;
  --muted:#8a7d65;
}

/* BASE */
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-family:'Inter',sans-serif;
  background:var(--black);
  color:var(--text);
  position:relative;
  overflow:hidden;
}

/* BACKGROUND EFFECTS */
body::before{
  content:'';
  position:fixed;
  inset:-50%;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(212,175,55,0.06),transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(212,175,55,0.04),transparent 50%);
}

.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:.08;
  animation:floatOrb 10s ease-in-out infinite alternate;
}

.orb-1{width:400px;height:400px;background:var(--gold);top:-100px;right:-100px}
.orb-2{width:300px;height:300px;background:var(--gold-light);bottom:-80px;left:-80px;animation-delay:-4s}

@keyframes floatOrb{
  to{transform:translate(30px,20px)}
}

/* CORNERS */
.corner{
  position:fixed;
  width:100px;
  height:100px;
  opacity:.4;
}

.corner-tl{
  top:24px;left:24px;
  border-top:1px solid var(--gold);
  border-left:1px solid var(--gold);
}

.corner-br{
  bottom:24px;right:24px;
  border-bottom:1px solid var(--gold);
  border-right:1px solid var(--gold);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 30px;
  width:100%;
  position:fixed;
  top:0;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(212,175,55,0.15);
  z-index:1000;
}

/* LOGO */
.logo{display:flex;flex-direction:column;line-height:1}

.logo-main{
  font:700 19px 'Playfair Display',serif;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s linear infinite;
}

.logo-sub{
  font-size:8px;
  letter-spacing:4px;
  color:gold;
}

@keyframes shine{
  from{background-position:-100%}
  to{background-position:100%}
}

/* NAV LINKS */
.nav-list{
  display:flex;
  gap:22px;
  list-style:none;
}

.nav-list a{
  font-size:12px;
  color:rgba(255,255,255,.75);
  text-decoration:none;
  position:relative;
  transition:.3s;
}

.nav-list a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:1px;
  background:gold;
  transition:.3s;
}

.nav-list a:hover::after{width:100%}
.nav-list a.active{color:var(--gold)}

/* AUTH LINKS */
.nav-auth-links{
  display:flex;
  gap:10px;
  align-items:center;
}

.nav-auth-links a{
  font-size:11px;
  padding:5px 14px;
  border-radius:20px;
  color:var(--gold);
  border:1px solid rgba(212,175,55,0.4);
  transition:.3s;
}

.nav-auth-links a:hover{
  background:rgba(212,175,55,0.1);
  border-color:var(--gold);
}

.nav-auth-links .solid{
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:#1a0f00;
  border:none;
  font-weight:600;
}

.nav-auth-links .solid:hover{
  box-shadow:0 4px 16px rgba(212,175,55,.4);
}

/* LOGIN CARD */
.login-wrapper{
  width:100%;
  max-width:460px;
  padding:20px;
  margin-top:60px;
  z-index:10;
  animation:cardReveal .9s cubic-bezier(.22,1,.36,1);
}

@keyframes cardReveal{
  from{opacity:0;transform:translateY(40px) scale(.97)}
  to{opacity:1;transform:none}
}

.login-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:26px;
  padding:44px 40px;
  position:relative;
}

.login-card::before{
  content:'';
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:60%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* BRAND */
.login-brand{text-align:center;margin-bottom:28px}

.brand-name{
  display:block;
  font:26px 'Playfair Display',serif;
  letter-spacing:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s linear infinite;
}

.brand-sub{
  font-size:10px;
  letter-spacing:4px;
  color:var(--gold-dim);
  text-transform:uppercase;
}

/* TABS */
.tab-bar{
  display:flex;
  padding:4px;
  border-radius:50px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(212,175,55,.15);
  margin-bottom:28px;
}

.tab-bar button{
  flex:1;
  padding:9px;
  border:none;
  border-radius:50px;
  background:none;
  color:var(--muted);
  font-size:12px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:.3s;
}

.tab-bar .active{
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:#1a0f00;
  font-weight:600;
  box-shadow:0 4px 16px rgba(212,175,55,.3);
}

/* FORM */
.field-group{margin-bottom:18px}

.field-group label{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
}

.field-group input{
  width:100%;
  padding:12px 16px;
  border-radius:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(212,175,55,.2);
  color:var(--text);
  transition:.3s;
}

.field-group input:focus{
  border-color:var(--gold);
  background:rgba(212,175,55,.05);
  box-shadow:0 0 0 3px rgba(212,175,55,.1);
}

/* BUTTONS */
.login-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:50px;
  font:600 15px 'Playfair Display',serif;
  letter-spacing:1.5px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold));
  background-size:200%;
  cursor:pointer;
  transition:.4s;
}

.login-btn:hover{
  background-position:right;
  transform:translateY(-1px);
  box-shadow:0 8px 30px rgba(212,175,55,.4);
}

.guest-btn{
  width:100%;
  padding:12px;
  border-radius:50px;
  border:1px solid rgba(212,175,55,.3);
  background:none;
  color:var(--gold);
  cursor:pointer;
  transition:.3s;
}

.guest-btn:hover{
  background:rgba(212,175,55,.08);
  border-color:var(--gold);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translate(-50%,20px);
  padding:11px 26px;
  border-radius:50px;
  background:rgba(20,20,20,.95);
  border:1px solid var(--gold);
  color:var(--gold);
  opacity:0;
  transition:.4s;
}

.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}

/* STATES */
.form-panel{display:none}
.form-panel.active{display:block}
    </style>																																																																																
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-main">Aurelia</span>
      <span class="logo-sub">Jewels</span>
    </div>
    <ul class="nav-list">
      <li><a href="accessory.html">Home</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="gifting.html">Gifting</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="login.html" class="active">Login</a></li>
    </ul>
    <div class="nav-auth-links">
      <a href="login.html">Login</a>
      <a href="login.html" class="solid" onclick="setTimeout(()=>switchTab('signup'),100)">Sign Up</a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-name">Aurelia</span>
        <span class="brand-sub">Member Access</span>
      </div>

      <div class="tab-bar">
        <button class="active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button id="tabSignup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="form-panel active" id="panelLogin">
        <div class="divider-line"><span></span><em>Welcome Back</em><span></span></div>
        <div class="field-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="field-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••">
        </div>
        <div class="field-options">
          <label class="remember"><input type="checkbox"> Remember me</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <button class="login-btn" onclick="handleLogin()">Sign In</button>
        <div class="separator"><span></span><em>or</em><span></span></div>
        <button class="guest-btn" onclick="window.location.href='accessory.html'">Continue as Guest</button>
        <p class="terms-text" style="margin-top:16px">New here? <a href="#" onclick="switchTab('signup')">Create an account</a></p>
      </div>

      <!-- SIGNUP PANEL -->
      <div class="form-panel" id="panelSignup">
        <div class="divider-line"><span></span><em>Join Aurelia</em><span></span></div>
        <div class="field-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name">
        </div>
        <div class="field-group">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="field-group">
          <label>Password</label>
          <input type="password" id="signupPass" placeholder="Min. 6 characters">
        </div>
        <div class="field-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Re-enter password">
        </div>
        <button class="login-btn" onclick="handleSignup()">Create Account</button>
        <p class="terms-text">By signing up you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a></p>
        <p class="terms-text" style="margin-top:10px">Already a member? <a href="#" onclick="switchTab('login')">Sign in</a></p>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // If already logged in, redirect
    if(localStorage.getItem('aurelia_user')) window.location.href='accessory.html';

    function switchTab(tab){
      document.getElementById('panelLogin').classList.toggle('active',tab==='login');
      document.getElementById('panelSignup').classList.toggle('active',tab==='signup');
      document.getElementById('tabLogin').classList.toggle('active',tab==='login');
      document.getElementById('tabSignup').classList.toggle('active',tab==='signup');
    }
    // Check URL hash
    if(location.hash==='#signup') switchTab('signup');

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),3000);
    }

    function handleLogin(){
      const email=document.getElementById('loginEmail').value.trim();
      const pass=document.getElementById('loginPass').value.trim();
      if(!email||!pass){showToast('Please fill in all fields.');return;}
      if(!email.includes('@')){showToast('Please enter a valid email.');return;}
      // Check if user is registered
      const users=JSON.parse(localStorage.getItem('aurelia_users')||'[]');
      const user=users.find(u=>u.email===email&&u.password===pass);
      if(!user){showToast('Invalid credentials. Please try again.');return;}
      localStorage.setItem('aurelia_user',JSON.stringify(user));
      showToast('✦ Welcome back, '+user.name+'!');
      setTimeout(()=>window.location.href='accessory.html',1500);
    }

    function handleSignup(){
      const name=document.getElementById('signupName').value.trim();
      const email=document.getElementById('signupEmail').value.trim();
      const pass=document.getElementById('signupPass').value.trim();
      const confirm=document.getElementById('signupConfirm').value.trim();
      if(!name||!email||!pass||!confirm){showToast('Please fill in all fields.');return;}
      if(!email.includes('@')){showToast('Please enter a valid email.');return;}
      if(pass.length<6){showToast('Password must be at least 6 characters.');return;}
      if(pass!==confirm){showToast('Passwords do not match.');return;}
      const users=JSON.parse(localStorage.getItem('aurelia_users')||'[]');
      if(users.find(u=>u.email===email)){showToast('An account with this email already exists.');return;}
      const newUser={name,email,password:pass};
      users.push(newUser);
      localStorage.setItem('aurelia_users',JSON.stringify(users));
      localStorage.setItem('aurelia_user',JSON.stringify(newUser));
      showToast('✦ Account created! Welcome, '+name+'!');
      setTimeout(()=>window.location.href='accessory.html',1500);
    }

    document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
    document.getElementById('signupConfirm').addEventListener('keydown',e=>{if(e.key==='Enter')handleSignup();});
  </script>
</body>
</html>
